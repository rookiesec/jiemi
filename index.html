                </div>
            </div>
            
            <div class="panel">

                    <button class="decrypt-btn" id="swapBtn">

                    </button>
                </div>

        </div>
        
        <div class="stats-panel">

    <script>

        const includeNumbersCheckbox = document.getElementById('includeNumbers');
        const includePunctuationCheckbox = document.getElementById('includePunctuation');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const encryptBtn = document.getElementById('encryptBtn');
        const decryptBtn = document.getElementById('decryptBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const swapBtn = document.getElementById('swapBtn');

        const exampleBtn = document.getElementById('exampleBtn');
        const animalGrid = document.getElementById('animalGrid');
        const personGrid = document.getElementById('personGrid');
        const notification = document.getElementById('notification');
        
       
        const charCountEl = document.getElementById('charCount');
        const animalEmojiCountEl = document.getElementById('animalEmojiCount');
        const personEmojiCountEl = document.getElementById('personEmojiCount');
        const encryptionStrengthEl = document.getElementById('encryptionStrength');
        
       
        const animalEmojis = [
            "🐶", "🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼", "🐨", "🐯", "🦁", "🐮", "🐷", "🐸", "🐵", 
            "🐔", "🐧", "🐦", "🐤", "🦆", "🦅", "🦉", "🦇", "🐺", "🐗", "🐴", "🦄", "🐝", "🐛", "🦋", 
            "🐌", "🐞", "🐜", "🦗", "🕷", "🦂", "🐢", "🐍", "🦎", "🐊", "🐅", "🐆", "🦓", "🦍", "🐘", 
            "🦏", "🐪", "🐫", "🦒", "🐃", "🐂", "🐄", "🐎", "🐖", "🐏", "🐑", "🐐", "🦌", "🐕", "🐩", 
            "🐈", "🐓", "🦃", "🕊", "🐇", "🐁", "🐀", "🐿", "🦔", "🐾", "🐉", "🐲", "🌵", "🎄", "🌲", 
            "🌳", "🌴", "🌱", "🌿", "☘️", "🍀", "🎍", "🎋", "🍃", "🍂", "🍁", "🍄", "🌾", "💐", "🌷", 
            "🌹", "🥀", "🌺", "🌸", "🌼", "🌻", "🌞", "🌝", "🌛", "🌜", "🌚", "🌕", "🌖", "🌗", "🌘", 
            "🌑", "🌒", "🌓", "🌔", "🌙", "🌎", "🌍", "🌏", "🪐", "💫", "⭐", "🌟", "✨", "⚡", "☄️", 
            "💥", "🔥", "🌪", "🌈", "☀️", "🌤", "⛅", "🌥", "☁️", "🌦", "🌧", "⛈", "🌩", "🌨", "❄️", 
            "☃️", "⛄", "🌬", "💨", "💧", "💦", "☔", "☂️", "🌊", "🌫"
        ];
        
        
        const personEmojis = [
            "😀", "😃", "😄", "😁", "😆", "😅", "😂", "🤣", "☺️", "😊", "😇", "🙂", "🙃", "😉", "😌", 
            "😍", "🥰", "😘", "😗", "😙", "😚", "😋", "😛", "😝", "😜", "🤪", "🤨", "🧐", "🤓", "😎", 
            "🥸", "🤩", "🥳", "😏", "😒", "😞", "😔", "😟", "😕", "🙁", "☹️", "😣", "😖", "😫", "😩", 
            "🥺", "😢", "😭", "😤", "😠", "😡", "🤬", "🤯", "😳", "🥵", "🥶", "😱", "😨", "😰", "😥", 
            "😓", "🤗", "🤔", "🤭", "🤫", "🤥", "😶", "😐", "😑", "😬", "🙄", "😯", "😦", "😧", "😮", 
            "😲", "🥱", "😴", "🤤", "😪", "😵", "🤐", "🥴", "🤢", "🤮", "🤧", "😷", "🤒", "🤕", "🤑", 
            "🤠", "😈", "👿", "👹", "👺", "🤡", "💩", "👻", "💀", "☠️", "👽", "👾", "🤖", "🎃", "😺", 
            "😸", "😹", "😻", "😼", "😽", "🙀", "😿", "😾", "👋", "🤚", "🖐️", "✋", "🖖", "👌", "🤌", 
            "🤏", "✌️", "🤞", "🤟", "🤘", "🤙", "👈", "👉", "👆", "🖕", "👇", "☝️", "👍", "👎", "✊", 
            "👊", "🤛", "🤜", "👏", "🙌", "👐", "🤲", "🤝", "🙏", "✍️", "💅", "🤳", "💪", "🦾", "🦿"
        ];
        
        
        let charToEmojiMap = {}; 
        let emojiToCharMap = {}; 
       
        
        let animalCharMap = {}; 
        let personCharMap = {}; 
        
        
        document.addEventListener('DOMContentLoaded', function() {
            
            setInputPlaceholder();
            
            
            generateEmojiMapping();
            updateEmojiGrids();
            updateStats();
            
            
            inputText.addEventListener('input', updateStats);
        });
        
        
        function setInputPlaceholder() {
            const placeholders = [
                "在此输入要加密的文本...例如：你好世界！Hello World! 123",
                "输入要加密或解密的文本...支持中文、英文、数字和符号",
                "可以输入中文、英文、数字或表情进行加密/解密",
                "试试输入：你好！This is a test. 123",
                "支持混合文本：中文English123！@#"
            ];
            
            const randomPlaceholder = placeholders[Math.floor(Math.random() * placeholders.length)];
            inputText.placeholder = randomPlaceholder;
        }
       
        
        function generateEmojiMapping() {
            
            charToEmojiMap = {};
            emojiToCharMap = {};
            animalCharMap = {};
            personCharMap = {};
            
            
            for (let i = 0; i <= 9; i++) {
                const char = i.toString();
                const emojiIndex = i % animalEmojis.length;
                const emoji = animalEmojis[emojiIndex];
                
                charToEmojiMap[char] = emoji;
                emojiToCharMap[emoji] = char;
                animalCharMap[char] = emoji;
            }
            
           
            for (let i = 0; i < 26; i++) {
                const char = String.fromCharCode(65 + i); 
                const emojiIndex = (10 + i) % animalEmojis.length; 
                const emoji = animalEmojis[emojiIndex];
                
                charToEmojiMap[char] = emoji;
                emojiToCharMap[emoji] = char;
                animalCharMap[char] = emoji;
            }
            
            
            for (let i = 0; i < 26; i++) {
                const char = String.fromCharCode(97 + i); 
                const emojiIndex = (36 + i) % animalEmojis.length; 
                const emoji = animalEmojis[emojiIndex];
                
                charToEmojiMap[char] = emoji;
                emojiToCharMap[emoji] = char;
                animalCharMap[char] = emoji;
            }
            
            
            const englishPunctuation = [
                '!', '@', '#', '$', '%', '^', '&', '*', '(', ')', 
                '_', '+', '-', '=', '[', ']', '{', '}', '|', '\\',
                ';', ':', '"', "'", ',', '.', '<', '>', '/', '?',
                '`', '~'
            ];
            
            englishPunctuation.forEach((char, index) => {
                const emojiIndex = (62 + index) % animalEmojis.length; 
                const emoji = animalEmojis[emojiIndex];
                
                charToEmojiMap[char] = emoji;
                emojiToCharMap[emoji] = char;
                animalCharMap[char] = emoji;
            });
            
            
            const chinesePunctuation = [
                '，', '。', '！', '？', '、', '；', '：', '「', '」', '『', '』', 
                '（', '）', '《', '》', '【', '】', '｛', '｝', '·', '～', '＠', 
                '＃', '￥', '％', '＆', '＊', '＋', '－', '＝', '＿'
            ];
            
            chinesePunctuation.forEach((char, index) => {
                const emojiIndex = index % personEmojis.length;
                const emoji = personEmojis[emojiIndex];
                
                charToEmojiMap[char] = emoji;
                emojiToCharMap[emoji] = char;
                personCharMap[char] = emoji;
            });
        }
        
        
        function getEmojiForChineseChar(char) {
            
            if (charToEmojiMap[char]) {
                return charToEmojiMap[char];
            }
            
            
            if (char.match(/[\u4e00-\u9fff]/)) {
                
                let hash = 0;
                for (let i = 0; i < char.length; i++) {
                    hash = ((hash << 5) - hash) + char.charCodeAt(i);
                    hash = hash & hash; 
                }
                
                
                hash = Math.abs(hash);
                
                
                const emojiIndex = hash % personEmojis.length;
                const emoji = personEmojis[emojiIndex];
                
                
                if (emojiToCharMap[emoji]) {
                    
                    for (let i = 1; i < personEmojis.length; i++) {
                        const nextIndex = (emojiIndex + i) % personEmojis.length;
                        const nextEmoji = personEmojis[nextIndex];
                        if (!emojiToCharMap[nextEmoji]) {
                            
                            charToEmojiMap[char] = nextEmoji;
                            emojiToCharMap[nextEmoji] = char;
                            personCharMap[char] = nextEmoji;
                            return nextEmoji;
                        }
                    }
                    
                    console.warn(`所有人物表情都已使用，字符 "${char}" 映射到 ${emoji}（可能有冲突）`);
                }
                
                
                charToEmojiMap[char] = emoji;
                emojiToCharMap[emoji] = char;
                personCharMap[char] = emoji;
                
                return emoji;
            }
            
            return null;
        }
        
        
        function getCharForEmoji(emoji) {
            return emojiToCharMap[emoji] || null;
        }
        
        
        function updateEmojiGrids() {
            
            animalGrid.innerHTML = '';
            animalEmojis.slice(0, 30).forEach(emoji => {
                const emojiElement = document.createElement('div');
                emojiElement.className = 'emoji-item animal-emoji';
                emojiElement.textContent = emoji;
                
                const char = emojiToCharMap[emoji];
                if (char) {
                    emojiElement.title = `对应: ${char}`;
                }
                
                animalGrid.appendChild(emojiElement);
            });
            
            
            personGrid.innerHTML = '';
            personEmojis.slice(0, 30).forEach(emoji => {
                const emojiElement = document.createElement('div');
                emojiElement.className = 'emoji-item person-emoji';
                emojiElement.textContent = emoji;
                
                const char = emojiToCharMap[emoji];
                if (char) {
                    emojiElement.title = `对应: ${char}`;
                }
                
                personGrid.appendChild(emojiElement);
            });
        }
        
        
        function updateStats() {
            const text = inputText.value;
            
            
            const totalChars = text.length;
            charCountEl.textContent = totalChars;
            
            
            if (outputText.textContent && outputText.textContent !== "加密或解密后的结果将显示在这里...") {
                const emojiText = outputText.textContent;
                
                
                let animalCount = 0;
                for (const emoji of animalEmojis) {
                    const regex = new RegExp(emoji.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
                    const matches = emojiText.match(regex);
                    if (matches) {
                        animalCount += matches.length;
                    }
                }
                
                
                let personCount = 0;
                for (const emoji of personEmojis) {
                    const regex = new RegExp(emoji.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
                    const matches = emojiText.match(regex);
                    if (matches) {
                        personCount += matches.length;
                    }
                }
                
                animalEmojiCountEl.textContent = animalCount;
                personEmojiCountEl.textContent = personCount;
                
                
                const emojiRatio = (animalCount + personCount) / Math.max(totalChars, 1);
                encryptionStrengthEl.textContent = `${Math.round(emojiRatio * 100)}%`;
            } else {
                animalEmojiCountEl.textContent = '0';
                personEmojiCountEl.textContent = '0';
                encryptionStrengthEl.textContent = '0%';
            }
        }
        
        
        function getCharType(char) {
            
            if (char.match(/[0-9]/)) {
                return 'number';
            }
            
            else if (char.match(/[a-zA-Z]/)) {
                return 'english';
            }
            
            else if (char.match(/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?~`]/)) {
                return 'english-punctuation';
            }
            
            else if (char.match(/[，。！？、；："'（）《》【】｛｝·～＠＃￥％＆＊＋－＝＿]/)) {
                return 'chinese-punctuation';
            }
            
            else if (char.match(/[\u4e00-\u9fff]/)) {
                return 'chinese';
            }
            
            else if (char.match(/\s/)) {
                return 'space';
            }
            
            else {
                return 'other';
            }
        }
        
        
        encryptBtn.addEventListener('click', function() {
            const text = inputText.value;
            
            if (!text.trim()) {
                showNotification('请输入要加密的文本！', 'error');
                return;
            }
            
            
            generateEmojiMapping();
            
            const preserveSpaces = preserveSpacesCheckbox.checked;
            const includeNumbers = includeNumbersCheckbox.checked;
            const includePunctuation = includePunctuationCheckbox.checked;
            
            let result = '';
            let animalCount = 0;
            let personCount = 0;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const charType = getCharType(char);
                
                
                let shouldEncrypt = false;
                
                if (charType === 'space') {
                    
                    if (preserveSpaces) {
                        result += char;
                    } else {
                        shouldEncrypt = true;
                    }
                } else if (charType === 'number') {
                    
                    shouldEncrypt = includeNumbers;
                } else if (charType === 'english-punctuation' || charType === 'chinese-punctuation') {
                    
                    shouldEncrypt = includePunctuation;
                } else if (charType === 'english' || charType === 'chinese') {
                    
                    shouldEncrypt = true;
                } else {
                    
                    shouldEncrypt = false;
                }
                
                if (shouldEncrypt) {
                    
                    let emoji = charToEmojiMap[char];
                    
                    
                    if (!emoji && charType === 'chinese') {
                        emoji = getEmojiForChineseChar(char);
                    }
                    
                    if (emoji) {
                        result += emoji;
                        
                        
                        if (animalEmojis.includes(emoji)) {
                            animalCount++;
                        } else if (personEmojis.includes(emoji)) {
                            personCount++;
                        }
                    } else {
                        
                        result += char;
                    }
                } else {
                    result += char;
                }
            }
            
            outputText.innerHTML = result || '加密结果为空';
            updateStats();
            updateEmojiGrids();
            
            let message = `加密完成！`;
            if (animalCount > 0) message += ` 动物表情: ${animalCount}个`;
            if (personCount > 0) message += ` 人物表情: ${personCount}个`;
            showNotification(message);
        });
        
        
        decryptBtn.addEventListener('click', function() {
            const text = inputText.value;
            
            if (!text.trim()) {
                showNotification('请输入要解密的文本！', 'error');
                return;
            }
            
            let result = '';
            let decryptedCount = 0;
            
            let i = 0;
            while (i < text.length) {
                const char = text[i];
                let emoji = char;
                let found = false;
                
                
                if (getCharForEmoji(emoji)) {
                    result += getCharForEmoji(emoji);
                    decryptedCount++;
                    found = true;
                    i++;
                } else if (i + 1 < text.length) {
                    
                    emoji = char + text[i + 1];
                    if (getCharForEmoji(emoji)) {
                        result += getCharForEmoji(emoji);
                        decryptedCount++;
                        found = true;
                        i += 2;
                    }
                }
                
                if (!found) {
                    
                    result += char;
                    i++;
                }
            }
            
            outputText.textContent = result || '解密结果为空';
            updateStats();
            showNotification(`解密完成！共解密了 ${decryptedCount} 个表情。`);
        });
        
        
        copyBtn.addEventListener('click', function() {
            if (!outputText.textContent || outputText.textContent === "加密或解密后的结果将显示在这里...") {
                showNotification('没有内容可复制！', 'error');
                return;
            }
            
            
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = outputText.textContent;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);
            
            showNotification('已复制到剪贴板！');
        });
        
        
        clearBtn.addEventListener('click', function() {
            inputText.value = '';
            outputText.textContent = '加密或解密后的结果将显示在这里...';
            updateStats();
            showNotification('已清空所有内容！');
        });
        
        
        swapBtn.addEventListener('click', function() {
            const temp = inputText.value;
            inputText.value = outputText.textContent === "加密或解密后的结果将显示在这里..." ? "" : outputText.textContent;
            outputText.textContent = temp || '加密或解密后的结果将显示在这里...';
            updateStats();
            showNotification('已交换输入和输出文本！');
        });
        
        
        testBtn.addEventListener('click', function() {
            const testText = "你好世界！Hello World! 123 这是一段测试文本。";
            inputText.value = testText;
            
            
            setTimeout(() => {
                encryptBtn.click();
                
                
                setTimeout(() => {
                    const encryptedText = outputText.textContent;
                    console.log("加密结果:", encryptedText);
                    
                    
                    swapBtn.click();
                    
                    
                    setTimeout(() => {
                        decryptBtn.click();
                        
                        
                        setTimeout(() => {
                            const decryptedText = outputText.textContent;
                            const success = testText === decryptedText;
                            
                            if (success) {
                                showNotification(`测试成功！加密解密完全正确。`, 'info');
                            } else {
                                showNotification(`测试失败！原文和解密后文本不一致。`, 'error');
                            }
                        }, 100);
                    }, 100);
                }, 100);
            }, 100);
        });
        
       
        exampleBtn.addEventListener('click', function() {
            const examples = [
                "你好世界！Hello World! 123 这是一段测试文本。",
                "数字：1234567890，英文：ABCDEFG abcdefg，中文：中华人民共和国",
                "标点符号测试：!@#$%^&*()，中文标点：，。！？",
                "混合文本：Hello 你好！123 数字，标点符号：,.;:!?",
                "加密测试：这是一段包含数字123和英文ABC的中文文本。"
            ];
            
            const randomExample = examples[Math.floor(Math.random() * examples.length)];
            inputText.value = randomExample;
            updateStats();
            showNotification('已加载示例文本！', 'info');
        });
        
       
        function showNotification(message, type = 'success') {
            notification.textContent = message;
            
            
            if (type === 'error') {
                notification.style.background = 'rgba(255, 94, 98, 0.9)';
            } else if (type === 'info') {
                notification.style.background = 'rgba(78, 205, 196, 0.9)';
            } else {
                notification.style.background = 'rgba(255, 153, 102, 0.9)';
            }
            
            notification.classList.add('show');
            
            setTimeout(function() {
                notification.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
